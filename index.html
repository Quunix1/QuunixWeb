<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quunix</title>

<link rel="icon" href="pp.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  touch-action: manipulation;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

body{
  font-family:Inter;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("banner.png") center/cover no-repeat;
  filter:brightness(0.35) saturate(1.3) blur(2px);
  transform:scale(1.08);
  z-index:-3;
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(0,200,255,0.25), transparent 60%),
    radial-gradient(circle at bottom, rgba(120,220,255,0.15), transparent 60%);
  z-index:-2;
}

/* CINEMATIC WIN */
.cinematic{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.75);
  z-index:9999;
  text-align:center;
  animation:bgPulse 2s infinite;
}

.cinematic h1{
  font-size:70px;
  color:#7dd3fc;
  text-shadow:0 0 30px #38bdf8;
  letter-spacing:5px;
}

.cinematic p{
  margin-top:10px;
  opacity:0.7;
}

@keyframes bgPulse{
  0%{backdrop-filter:blur(0px);}
  50%{backdrop-filter:blur(8px);}
  100%{backdrop-filter:blur(0px);}
}

/* CURSOR */
.cursor{
  position:fixed;
  width:10px;height:10px;
  background:#7dd3fc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 0 20px #38bdf8;
  z-index:999;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  text-align:center;
}

.pfp{
  width:170px;
  height:170px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #7dd3fc;
  box-shadow:0 0 30px #38bdf8;
  animation:pulse 3s infinite;
}

.name{
  font-family:Orbitron;
  font-size:65px;
  color:#7dd3fc;
  text-shadow:0 0 20px #38bdf8;
}

.scroll{
  position:absolute;
  bottom:20px;
  font-size:24px;
  opacity:0.6;
  animation:bounce 1.5s infinite;
}

/* WORDLE */
.wordle{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:16px;
  padding:20px;
}

.title{
  font-size:20px;
  color:#7dd3fc;
  text-shadow:0 0 10px #38bdf8;
}

/* BOARD */
.board{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.row{
  display:flex;
  gap:8px;
  justify-content:center;
  animation:rowPop 0.25s ease;
}

@keyframes rowPop{
  0%{transform:scale(0.9);opacity:0.3;}
  100%{transform:scale(1);opacity:1;}
}

/* TILE */
.tile{
  width:56px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  text-transform:uppercase;
  transition:0.2s;
}

.flip{
  animation:flip 0.45s ease;
}

@keyframes flip{
  0%{transform:rotateX(0);}
  50%{transform:rotateX(90deg);}
  100%{transform:rotateX(0);}
}

/* COLORS */
.green{background:#22c55e;}
.yellow{background:#eab308;}
.gray{background:#6b7280;}

/* KEYBOARD */
.keyboard{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  max-width:700px;
  margin-top:10px;
}

.keyboard button{
  padding:12px;
  min-width:34px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  overflow:hidden;
  transition:0.2s;
}

/* ripple */
.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:rippleAnim 0.6s linear;
  background:rgba(125,211,252,0.5);
  width:100px;
  height:100px;
  pointer-events:none;
}

@keyframes rippleAnim{
  to{
    transform:scale(3);
    opacity:0;
  }
}

/* keyboard highlight */
.correctKey{
  background:#22c55e !important;
  box-shadow:0 0 15px #22c55e;
}

.presentKey{
  background:#eab308 !important;
  box-shadow:0 0 15px #eab308;
}

/* MOBILE */
@media(max-width:600px){
  .name{font-size:38px;}
  .tile{width:44px;height:44px;font-size:18px;}
  .keyboard button{min-width:30px;padding:10px;}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="cursor" id="cursor"></div>

<div class="hero">
  <img src="pp.png" class="pfp">
  <div class="name">Quunix</div>
  <div class="scroll">↓</div>
</div>

<div class="wordle">
  <div class="title">Bir kelime var...</div>
  <div class="board" id="board"></div>
  <div class="keyboard" id="keyboard"></div>
</div>

<div class="cinematic" id="cinematic">
  <h1>ÖYKÜ</h1>
  <p>bulundu 💙</p>
</div>

<script>

/* cursor */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* game */
const WORD="ÖYKÜ";
const ROWS=6;
const COLS=4;

let row=0;
let col=0;
let locked=false;

let board=Array.from({length:ROWS},()=>Array(COLS).fill(""));

const boardEl=document.getElementById("board");
const keyboardEl=document.getElementById("keyboard");

/* board */
function initBoard(){
  for(let r=0;r<ROWS;r++){
    let rowEl=document.createElement("div");
    rowEl.className="row";

    for(let c=0;c<COLS;c++){
      let tile=document.createElement("div");
      tile.className="tile";
      tile.id=`cell-${r}-${c}`;
      rowEl.appendChild(tile);
    }

    boardEl.appendChild(rowEl);
  }
}

/* keyboard */
const keys=[
  "Q","W","E","R","T","Y","U","I","O","P",
  "Ğ","Ü","A","S","D","F","G","H","J","K","L",
  "Ş","İ","Z","X","C","V","B","N","M"
];

function initKeyboard(){
  keys.forEach(k=>{
    let b=document.createElement("button");
    b.innerText=k;
    b.onclick=(e)=>{
      ripple(e,b);
      press(k);
    };
    keyboardEl.appendChild(b);
  });

  let enter=document.createElement("button");
  enter.innerText="ENTER";
  enter.onclick=check;

  let del=document.createElement("button");
  del.innerText="⌫";
  del.onclick=back;

  keyboardEl.appendChild(enter);
  keyboardEl.appendChild(del);
}

/* ripple */
function ripple(e,btn){
  let circle=document.createElement("span");
  circle.classList.add("ripple");

  let rect=btn.getBoundingClientRect();
  circle.style.left=(e.clientX-rect.left)+"px";
  circle.style.top=(e.clientY-rect.top)+"px";

  btn.appendChild(circle);
  setTimeout(()=>circle.remove(),600);
}

/* input */
document.addEventListener("keydown",(e)=>{
  if(locked) return;

  let k=e.key.toUpperCase();

  if(k==="ENTER") check();
  else if(k==="BACKSPACE") back();
  else if(/^[A-ZÇŞİÖÜ]$/.test(k)) press(k);
});

function press(k){
  if(locked) return;
  if(col<COLS && row<ROWS){
    board[row][col]=k;
    let cell=document.getElementById(`cell-${row}-${col}`);

    cell.innerText=k;
    cell.classList.remove("flip");
    void cell.offsetWidth;
    cell.classList.add("flip");

    col++;
  }
}

function back(){
  if(locked) return;
  if(col>0){
    col--;
    board[row][col]="";
    document.getElementById(`cell-${row}-${col}`).innerText="";
  }
}

/* keyboard update */
function updateKeyboard(letter,status){
  let buttons=[...keyboardEl.querySelectorAll("button")];
  buttons.forEach(b=>{
    if(b.innerText===letter){
      if(status==="green") b.classList.add("correctKey");
      else if(status==="yellow") b.classList.add("presentKey");
    }
  });
}

/* check */
function check(){
  if(locked) return;
  if(col<COLS) return;

  let guess=board[row].join("");
  let used=Array(COLS).fill(false);

  let cells=[];

  for(let i=0;i<COLS;i++){
    let cell=document.getElementById(`cell-${row}-${i}`);
    cells.push(cell);

    if(guess[i]===WORD[i]){
      cell.classList.add("green");
      used[i]=true;
      updateKeyboard(guess[i],"green");
    }
  }

  for(let i=0;i<COLS;i++){
    let cell=cells[i];
    if(cell.classList.contains("green")) continue;

    let found=false;

    for(let j=0;j<COLS;j++){
      if(!used[j] && guess[i]===WORD[j]){
        found=true;
        used[j]=true;
        break;
      }
    }

    if(found){
      cell.classList.add("yellow");
      updateKeyboard(guess[i],"yellow");
    }
    else{
      cell.classList.add("gray");
    }
  }

  if(guess===WORD){
    win();
    return;
  }

  row++;
  col=0;

  if(row===ROWS){
    locked=true;
  }
}

/* win cinematic */
function win(){
  locked=true;
  document.getElementById("cinematic").style.display="flex";
}

/* init */
initBoard();
initKeyboard();

</script>

</body>
</html>
