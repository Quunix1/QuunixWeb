<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quunix</title>

<link rel="icon" href="pp.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  user-select:none;
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  touch-action:manipulation;
}

body{
  font-family:Inter;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("banner.png") center/cover no-repeat;
  filter:brightness(0.35) saturate(1.3) blur(2px);
  transform:scale(1.08);
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(0,200,255,0.25), transparent 60%),
    radial-gradient(circle at bottom, rgba(120,220,255,0.15), transparent 60%);
  z-index:-1;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.pfp{
  width:170px;
  height:170px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #7dd3fc;
  box-shadow:0 0 30px #38bdf8;
}

.name{
  font-family:Orbitron;
  font-size:65px;
  color:#7dd3fc;
  text-shadow:0 0 20px #38bdf8;
}

.scroll{
  position:absolute;
  bottom:20px;
  font-size:24px;
  opacity:0.6;
}

/* WORDLE */
.wordle{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:14px;
  padding:20px;
}

.title{
  font-size:20px;
  color:#7dd3fc;
}

/* BOARD */
.board{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.row{
  display:flex;
  gap:7px;
  justify-content:center;
  animation:rowPop 0.2s ease;
}

@keyframes rowPop{
  0%{transform:scale(0.9);opacity:0.4;}
  100%{transform:scale(1);opacity:1;}
}

/* TILE */
.tile{
  width:56px;
  height:56px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  font-weight:bold;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  text-transform:uppercase;
  transition:0.2s;
}

/* ONLY GREEN EFFECT */
.green{
  background:#22c55e;
  animation:popGreen 0.25s ease;
}

@keyframes popGreen{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

.yellow{background:#eab308;}
.gray{background:#6b7280;}

/* KEYBOARD (WORDLE STYLE) */
.keyboard{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:10px;
}

/* ROWS */
.krow{
  display:flex;
  justify-content:center;
  gap:6px;
}

/* KEY */
.key{
  padding:12px;
  min-width:34px;
  border-radius:8px;
  border:none;
  background:#111;
  color:white;
  font-weight:bold;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:0.2s;
}

/* ripple */
.ripple{
  position:absolute;
  width:80px;
  height:80px;
  background:rgba(125,211,252,0.5);
  border-radius:50%;
  transform:scale(0);
  animation:ripple 0.5s linear;
  pointer-events:none;
}

@keyframes ripple{
  to{
    transform:scale(3);
    opacity:0;
  }
}

/* highlight keys */
.goodKey{
  background:#22c55e !important;
}

.presentKey{
  background:#eab308 !important;
}

/* MOBILE */
@media(max-width:600px){
  .name{font-size:40px;}
  .tile{width:44px;height:44px;font-size:18px;}
  .key{padding:10px;min-width:30px;font-size:14px;}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="hero">
  <img src="pp.png" class="pfp">
  <div class="name">Quunix</div>
  <div class="scroll">↓</div>
</div>

<div class="wordle">
  <div class="title">Bir kelime...</div>
  <div class="board" id="board"></div>
  <div class="keyboard" id="keyboard"></div>
</div>

<script>

const WORD="OYKU";
const ROWS=6;
const COLS=4;

let row=0;
let col=0;
let locked=false;

let board=Array.from({length:ROWS},()=>Array(COLS).fill(""));

const boardEl=document.getElementById("board");
const keyboardEl=document.getElementById("keyboard");

/* BOARD */
function initBoard(){
  for(let r=0;r<ROWS;r++){
    let rowEl=document.createElement("div");
    rowEl.className="row";

    for(let c=0;c<COLS;c++){
      let t=document.createElement("div");
      t.className="tile";
      t.id=`cell-${r}-${c}`;
      rowEl.appendChild(t);
    }

    boardEl.appendChild(rowEl);
  }
}

/* KEYBOARD (NORMAL TR QWERTY LAYOUT) */
const layout=[
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["Z","X","C","V","B","N","M"]
];

function initKeyboard(){
  layout.forEach(row=>{
    let r=document.createElement("div");
    r.className="krow";

    row.forEach(k=>{
      let b=document.createElement("button");
      b.className="key";
      b.innerText=k;

      b.onclick=(e)=>{
        ripple(e,b);
        press(k);
      };

      r.appendChild(b);
    });

    keyboardEl.appendChild(r);
  });

  let last=document.createElement("div");
  last.className="krow";

  let enter=document.createElement("button");
  enter.className="key";
  enter.innerText="ENTER";
  enter.onclick=check;

  let del=document.createElement("button");
  del.className="key";
  del.innerText="⌫";
  del.onclick=back;

  last.appendChild(enter);
  last.appendChild(del);

  keyboardEl.appendChild(last);
}

/* ripple */
function ripple(e,btn){
  let s=document.createElement("span");
  s.className="ripple";

  let rect=btn.getBoundingClientRect();
  s.style.left=(e.clientX-rect.left)+"px";
  s.style.top=(e.clientY-rect.top)+"px";

  btn.appendChild(s);
  setTimeout(()=>s.remove(),500);
}

/* input */
document.addEventListener("keydown",(e)=>{
  if(locked) return;

  let k=e.key.toUpperCase();

  if(k==="ENTER") check();
  else if(k==="BACKSPACE") back();
  else if(/^[A-ZÇŞİĞÜÖ]$/.test(k)) press(k);
});

function press(k){
  if(locked) return;
  if(col<COLS && row<ROWS){
    board[row][col]=k;

    let cell=document.getElementById(`cell-${row}-${col}`);
    cell.innerText=k;

    col++;
  }
}

function back(){
  if(locked) return;
  if(col>0){
    col--;
    board[row][col]="";
    document.getElementById(`cell-${row}-${col}`).innerText="";
  }
}

/* keyboard highlight */
function markKey(letter,type){
  document.querySelectorAll(".key").forEach(k=>{
    if(k.innerText===letter){
      if(type==="green") k.classList.add("goodKey");
      if(type==="yellow") k.classList.add("presentKey");
    }
  });
}

/* check */
function check(){
  if(locked) return;
  if(col<COLS) return;

  let guess=board[row].join("");
  let used=Array(COLS).fill(false);

  let cells=[];

  for(let i=0;i<COLS;i++){
    let c=document.getElementById(`cell-${row}-${i}`);
    cells.push(c);

    if(guess[i]===WORD[i]){
      c.classList.add("green");
      used[i]=true;
      markKey(guess[i],"green");
    }
  }

  for(let i=0;i<COLS;i++){
    let c=cells[i];
    if(c.classList.contains("green")) continue;

    let found=false;

    for(let j=0;j<COLS;j++){
      if(!used[j] && guess[i]===WORD[j]){
        found=true;
        used[j]=true;
        break;
      }
    }

    if(found){
      c.classList.add("yellow");
      markKey(guess[i],"yellow");
    }
    else{
      c.classList.add("gray");
    }
  }

  row++;
  col=0;

  if(guess===WORD){
    locked=true;
  }

  if(row===ROWS){
    locked=true;
  }
}

/* start */
initBoard();
initKeyboard();

</script>

</body>
</html>
