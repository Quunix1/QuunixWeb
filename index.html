<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quunix</title>

<link rel="icon" href="pp.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:Inter;
  color:white;
  background:#000;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("banner.png") center/cover no-repeat;
  filter:brightness(0.35) saturate(1.3) blur(2px);
  transform:scale(1.08);
}

.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(0,200,255,0.25), transparent 60%),
    radial-gradient(circle at bottom, rgba(120,220,255,0.15), transparent 60%);
}

/* CURSOR */
.cursor{
  position:fixed;
  width:10px;
  height:10px;
  background:#7dd3fc;
  border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 0 20px #38bdf8;
}

/* CENTER */
.wrap{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:40px;
  text-align:center;
}

/* PROFILE */
.pfp{
  width:210px;
  height:210px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #7dd3fc;
  box-shadow:0 0 30px #38bdf8, 0 0 90px rgba(56,189,248,0.45);
  animation:pulse 3s infinite ease-in-out;
}

/* NAME */
.name{
  font-family:Orbitron, sans-serif;
  font-size:80px;
  font-weight:900;
  letter-spacing:6px;
  color:#7dd3fc;
  text-shadow:0 0 10px #38bdf8, 0 0 35px #38bdf8, 0 0 80px rgba(56,189,248,0.6);
}

/* SPOTIFY */
.spotify{
  width:650px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(56,189,248,0.25), 0 0 90px rgba(56,189,248,0.15);
}

/* SECRET TEXT */
.secret{
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:14px;
  letter-spacing:2px;
  color:white;
  opacity:0.15;
}

.secret .h{
  opacity:0;
}

/* ANIMATION */
@keyframes pulse{
  0%,100%{
    transform:scale(1);
    box-shadow:0 0 30px #38bdf8, 0 0 80px rgba(56,189,248,0.35);
  }
  50%{
    transform:scale(1.04);
    box-shadow:0 0 50px #38bdf8, 0 0 120px rgba(56,189,248,0.55);
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="cursor" id="cursor"></div>

<div class="wrap">

  <img src="pp.png" class="pfp">

  <div class="name">Quunix</div>

  <div class="spotify">
    <iframe 
      style="border-radius:12px"
      src="https://open.spotify.com/embed/playlist/55AzvgCu5D4WubbdPx1VOa?utm_source=generator&theme=0"
      width="100%" height="352"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

</div>

<div class="secret">
  i miss<span class="h"> H</span>
</div>

<script>
const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});
</script>

</body>
</html>
