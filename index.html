<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sana Bir Mesajım Var</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    :root {
        --primary: #10b981;
        --primary-glow: rgba(16, 185, 129, 0.5);
        --danger: #ef4444;
        --bg-dark: #020617;
        --glass-bg: rgba(15, 23, 42, 0.4);
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background-color: var(--bg-dark);
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 25%),
            radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.08), transparent 25%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #f8fafc;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        position: relative;
    }

    /* Arkada uçuşan animasyonlu ışıklar */
    .ambient-light {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        animation: float 10s infinite ease-in-out alternate;
        z-index: 0;
    }
    .light-1 { width: 300px; height: 300px; background: rgba(16, 185, 129, 0.15); top: -10%; left: -10%; }
    .light-2 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.1); bottom: -20%; right: -10%; animation-delay: -5s; }

    @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, 50px) scale(1.1); }
    }

    .container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 10;
        padding: 20px;
        perspective: 1000px;
    }

    /* --- ORTAK SAYFA AYARLARI --- */
    .page {
        flex: 1;
        display: none;
        flex-direction: column;
        justify-content: center;
        opacity: 0;
        transform: translateY(30px) scale(0.95);
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        position: absolute;
        width: calc(100% - 40px);
        height: calc(100vh - 40px);
    }
    .page.active { 
        display: flex; 
        opacity: 1; 
        transform: translateY(0) scale(1); 
    }

    /* --- SAYFA 1: TERMINAL --- */
    .terminal-window {
        background: rgba(9, 9, 11, 0.85);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255,255,255,0.05) inset;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        height: 65vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }

    /* Terminal Ekranı Scanline Efekti */
    .terminal-window::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 2;
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
    }

    .terminal-header {
        background: rgba(0, 0, 0, 0.5);
        padding: 12px 16px;
        display: flex;
        gap: 8px;
        border-bottom: 1px solid var(--glass-border);
        align-items: center;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    #terminal-content {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        color: #6ee7b7;
        text-shadow: 0 0 5px rgba(110, 231, 183, 0.4);
        z-index: 3;
        position: relative;
    }

    .line { margin-bottom: 10px; line-height: 1.6; letter-spacing: 0.3px; }
    
    .cursor {
        display: inline-block;
        width: 8px;
        height: 15px;
        background-color: var(--primary);
        vertical-align: middle;
        animation: blink 1s step-end infinite;
        margin-left: 2px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    .inputLine { display: flex; align-items: center; margin-top: 15px; }
    .inputLine span { color: var(--primary); margin-right: 10px; font-weight: 700; }
    .inputLine input {
        flex: 1; background: transparent; border: none; color: #fff;
        font-family: 'Fira Code', monospace; font-size: 14px; outline: none;
        caret-color: transparent; /* Özel imlecimiz olduğu için gerçeğini gizledik */
        text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }

    /* --- SAYFA 2: SEÇİM --- */
    h2 { 
        text-align: center; font-size: 28px; margin-bottom: 30px; 
        font-weight: 800; letter-spacing: -0.5px;
        background: linear-gradient(to right, #fff, #a7f3d0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .choiceBox { display: flex; gap: 20px; width: 100%; margin-bottom: 40px; }

    .card {
        flex: 1; padding: 15px; border-radius: 20px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
        text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex; flex-direction: column; align-items: center;
        position: relative;
        overflow: hidden;
    }

    .card::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        pointer-events: none;
    }

    .card.activeCard {
        background: rgba(16, 185, 129, 0.05);
        border-color: var(--primary);
        box-shadow: 0 10px 40px var(--primary-glow), inset 0 0 20px rgba(16, 185, 129, 0.1);
        transform: translateY(-10px) scale(1.02);
    }

    .card.disabled { opacity: 0.4; filter: grayscale(100%) contrast(0.8); }

    .card div { margin-bottom: 15px; font-size: 14px; font-weight: 600; color: #f1f5f9; z-index: 2; }

    .card img {
        width: 100%; aspect-ratio: 1/1; object-fit: cover;
        border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        z-index: 2; position: relative;
        background: #1e293b; /* Resim yüklenmezse arka plan */
    }

    .nextBtn {
        width: 100%; padding: 18px; border: none; border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), #059669);
        color: white; font-size: 16px; font-weight: 800; font-family: 'Inter', sans-serif;
        cursor: pointer; transition: all 0.3s ease;
        box-shadow: 0 10px 25px var(--primary-glow);
        text-transform: uppercase; letter-spacing: 1px;
    }
    .nextBtn:hover { transform: translateY(-2px); box-shadow: 0 15px 35px var(--primary-glow); }
    .nextBtn:active { transform: scale(0.97); }

    /* --- SAYFA 3: ASIL SORU --- */
    .buttons { position: relative; height: 200px; margin-top: 40px; display: flex; justify-content: center; gap: 25px; align-items: flex-start;}

    .action-btn {
        padding: 16px 40px; border: none; border-radius: 14px;
        color: #fff; font-size: 20px; font-weight: 800; cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        font-family: 'Inter', sans-serif;
    }

    #yes {
        background: linear-gradient(135deg, var(--primary), #059669);
        box-shadow: 0 10px 25px var(--primary-glow);
        z-index: 10;
        animation: pulseHeart 2s infinite;
    }
    #yes:hover { transform: scale(1.05) translateY(-2px); }
    #yes:active { transform: scale(0.95); }

    #no {
        background: linear-gradient(135deg, var(--danger), #b91c1c);
        box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
        position: absolute; /* Kaçabilmesi için mutlak pozisyon */
        z-index: 50;
    }

    @keyframes pulseHeart {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
        70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* --- SONUÇ EKRANI --- */
    .result {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: none; flex-direction: column; justify-content: center; align-items: center;
        background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        opacity: 0; transform: scale(1.1); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
    }

    .result.show { opacity: 1; transform: scale(1); display: flex; }

    .result-content {
        text-align: center;
        animation: dropIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: 0.2s;
        opacity: 0;
        transform: translateY(-50px);
    }

    @keyframes dropIn {
        to { opacity: 1; transform: translateY(0); }
    }

    .result img {
        width: 250px; height: 250px; object-fit: cover;
        border-radius: 50%; border: 6px solid var(--primary);
        box-shadow: 0 0 60px var(--primary-glow);
        margin-bottom: 30px;
    }

    .result .big { 
        font-size: 42px; font-weight: 800; color: #fff; margin-bottom: 10px; 
        text-shadow: 0 0 20px var(--primary-glow);
    }
    .result .desc { font-size: 20px; color: #a7f3d0; font-weight: 500; }

    /* EFEKTLER */
    .heart {
        position: fixed; pointer-events: none; z-index: 99;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='%2310b981' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z'/%3e%3c/svg%3e");
        background-size: contain;
        background-repeat: no-repeat;
    }

    .celebrate-flash {
        animation: flashBg 1s ease-out forwards;
    }
    @keyframes flashBg {
        0% { background: #fff; }
        100% { background: var(--bg-dark); }
    }
</style>
</head>

<body>

<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<div class="container" id="app">

    <div id="p1" class="page active">
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div id="terminal-content"></div>
        </div>
    </div>

    <div id="p2" class="page">
        <h2>Seçiminin Sonuçları</h2>
        <div class="choiceBox">
            <div class="card activeCard">
                <div>"Evet" dersen Kaori</div>
                <img src="mutlu.png" alt="Mutlu" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjNDc1NTY5Ij48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIi8+PC9zdmc+'">
            </div>
            <div class="card disabled">
                <div>"Hayır" dersen Kaori</div>
                <img src="mutsuz.png" alt="Mutsuz" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjMWUyOTNiIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIi8+PC9zdmc+'">
            </div>
        </div>
        <button class="nextBtn" id="next">Riski Anladım, Devam Et</button>
    </div>

    <div id="p3" class="page">
        <h2>Benimle çıkar mısın?</h2>
        <div class="buttons">
            <button class="action-btn" id="yes">Evet</button>
            <button class="action-btn" id="no" style="right: 0;">Hayır</button>
        </div>
    </div>

</div>

<div class="result" id="result">
    <div class="result-content">
        <img src="mutlu.png" alt="Sonuç" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjNDc1NTY5Ij48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIi8+PC9zdmc+'">
        <div class="big">Biliyordum!</div>
        <div class="desc">Wp gel balim :)</div>
    </div>
</div>

<script>
    const terminal = document.getElementById("terminal-content");
    const app = document.getElementById("app");
    const noBtn = document.getElementById("no");

    let currentInput = null;

    // SAYFA GEÇİŞİ (Yumuşatıldı)
    function showPage(id) {
        const activePage = document.querySelector(".page.active");
        if(activePage) {
            activePage.style.opacity = "0";
            activePage.style.transform = "translateY(-30px) scale(0.95)";
            setTimeout(() => {
                activePage.classList.remove("active");
                const nextPage = document.getElementById(id);
                nextPage.classList.add("active");
            }, 400); // CSS transition süresini bekle
        } else {
            document.getElementById(id).classList.add("active");
        }
    }

    // TERMINAL DAKTİLO EFEKTİ (Daha Gerçekçi)
    async function typeText(text, speed = 35) {
        return new Promise(resolve => {
            const line = document.createElement("div");
            line.className = "line";
            
            // Mevcut imleci sil (varsa)
            const oldCursor = document.querySelector('.cursor');
            if(oldCursor) oldCursor.remove();

            terminal.appendChild(line);
            let i = 0;
            
            const cursor = document.createElement("span");
            cursor.className = "cursor";
            
            const interval = setInterval(() => {
                // Karakterleri ekle, imleci sona taşı
                line.innerHTML = text.substring(0, i + 1);
                line.appendChild(cursor);
                i++;
                
                terminal.scrollTop = terminal.scrollHeight;
                
                if (i >= text.length) {
                    clearInterval(interval);
                    setTimeout(resolve, Math.random() * 200 + 100); // Rastgele insanımsı duraksama
                }
            }, speed + (Math.random() * 20 - 10)); // Rastgele hız değişimi
        });
    }

    // TERMINAL INPUT FONKSİYONU (İmleç Korumalı)
    function awaitInput(promptText) {
        return new Promise(resolve => {
            const oldCursor = document.querySelector('.cursor');
            if(oldCursor) oldCursor.remove();

            const wrap = document.createElement("div");
            wrap.className = "inputLine";
            
            const span = document.createElement("span");
            span.innerText = "root@kalp:~# " + promptText;
            
            const inputContainer = document.createElement("div");
            inputContainer.style.position = "relative";
            inputContainer.style.flex = "1";
            inputContainer.style.display = "flex";
            inputContainer.style.alignItems = "center";

            const input = document.createElement("input");
            input.type = "text";
            input.autocomplete = "off";
            input.style.width = "100%";
            
            // Sahte imleç için element
            const fakeCursor = document.createElement("span");
            fakeCursor.className = "cursor";
            fakeCursor.style.position = "absolute";
            
            inputContainer.appendChild(input);
            inputContainer.appendChild(fakeCursor);

            wrap.appendChild(span);
            wrap.appendChild(inputContainer);
            terminal.appendChild(wrap);
            input.focus();
            terminal.scrollTop = terminal.scrollHeight;

            // İmleci yazının sonuna hizala
            const updateCursor = () => {
                fakeCursor.style.left = (input.value.length * 8.4) + "px"; // 8.4px yaklaşık karakter genişliği fonta göre
            };
            input.addEventListener("input", updateCursor);

            input.onkeydown = (e) => {
                if (e.key === "Enter" && input.value.trim() !== "") {
                    const val = input.value.trim().toLowerCase();
                    input.disabled = true;
                    fakeCursor.remove(); // Gönderilince imleci kaldır
                    
                    // Gönderilen cevabı düz metin olarak satıra yazdırıp input'u gizleyelim (temiz görünüm)
                    wrap.innerHTML = `<span>root@kalp:~# ${promptText}</span><span style="color:#fff">${input.value}</span>`;
                    
                    resolve(val);
                }
            };
            
            // Tıklayınca hep odakta kalsın
            document.addEventListener('click', () => input.focus());
        });
    }

    // TERMINAL SENARYOSU
    async function startTerminal() {
        await new Promise(r => setTimeout(r, 800));
        await typeText("Sistem başlatılıyor...", 40);
        await typeText("[OK] Duygu modülleri yüklendi.", 20);
        await typeText("[OK] Kritik soru paketleri açılıyor...", 30);
        await typeText("Uyarı: Bu işlemin geri dönüşü yoktur.", 60);
        
        let ans1 = "";
        while (ans1 !== "y" && ans1 !== "evet") {
            ans1 = await awaitInput("Devam edilsin mi? (y/n): ");
        }

        await typeText("Bağlantı kuruluyor...", 40);
        
        let ans2 = "";
        while (ans2 !== "y" && ans2 !== "evet") {
            ans2 = await awaitInput("Gerçekten hazır mısın? (y/n): ");
        }

        await typeText("Arayüze geçiliyor... Lütfen bekleyin.", 30);
        setTimeout(() => showPage("p2"), 1000);
    }

    // SAYFA 2 İŞLEMLERİ
    document.getElementById("next").onclick = () => {
        showPage("p3");
        // Sayfa 3 açıldığında butonu başlangıç pozisyonuna yerleştir
        setTimeout(() => {
            const yesBtn = document.getElementById("yes");
            const yesRect = yesBtn.getBoundingClientRect();
            // Hayır butonunu evetin yanına başlangıç olarak ayarla
            noBtn.style.position = "absolute";
            noBtn.style.left = "calc(50% + 10px)"; 
            noBtn.style.top = "0";
        }, 500);
    };

    // KAÇAN "HAYIR" BUTONU MANTIĞI (Akıcı Kaçış)
    function escapeBtn() {
        noBtn.style.position = "fixed";
        
        // Güvenli alan hesaplama
        const padding = 30;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
        const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }

    // Hem üzerine gelince hem de dokununca kaçması
    noBtn.addEventListener("mouseover", escapeBtn);
    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault(); 
        escapeBtn();
    });
    noBtn.addEventListener("click", escapeBtn);

    // GELİŞMİŞ KALP PATLAMA EFEKTİ (Her yöne fışkıran kalpler)
    function createHeartExplosion() {
        const heartCount = 70; // Partikül sayısı
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        for (let i = 0; i < heartCount; i++) {
            setTimeout(() => {
                const heart = document.createElement("div");
                heart.className = "heart";
                
                // Kalp boyutu (rastgele)
                const size = Math.random() * 30 + 15;
                heart.style.width = size + "px";
                heart.style.height = size + "px";

                // Başlangıç noktası
                heart.style.left = centerX - (size/2) + "px";
                heart.style.top = centerY - (size/2) + "px";

                document.body.appendChild(heart);

                // Gidilecek rastgele hedef açı ve uzaklık
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 400; // Ne kadar uzağa gidecek
                
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity + 100; // Hafif yerçekimi etkisi için +100
                const rotation = Math.random() * 360 - 180;

                // Animasyonu başlat
                requestAnimationFrame(() => {
                    heart.style.transition = "all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1)";
                    heart.style.transform = `translate(${tx}px, ${ty}px) rotate(${rotation}deg) scale(0)`;
                    heart.style.opacity = "0";
                });

                // Çöp toplama
                setTimeout(() => heart.remove(), 1600);
            }, i * 15); // Arka arkaya hızlıca çıkış
        }
    }

    // "EVET" BUTONUNA TIKLANINCA
    document.getElementById("yes").onclick = () => {
        document.body.classList.add("celebrate-flash");
        
        const resultScreen = document.getElementById("result");
        resultScreen.classList.add("show");
        
        // Büyük kalp patlaması
        createHeartExplosion();
        // 1 saniye sonra bir daha patlasın
        setTimeout(createHeartExplosion, 800);
        setTimeout(createHeartExplosion, 1600);
    };

    // Uygulamayı Başlat
    startTerminal();

</script>

</body>
</html>
