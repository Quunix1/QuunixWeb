<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Sayfa Bulunamadı.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:url("banner.png") center/cover no-repeat;
  filter:brightness(0.35) saturate(1.2) blur(2px);
  transform:scale(1.05);
  z-index:-2;
}

/* overlay */
.overlay{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top, rgba(56,189,248,0.25), transparent 60%),
             radial-gradient(circle at bottom, rgba(125,211,252,0.15), transparent 60%);
  z-index:-1;
}

/* CARD */
.card{
  text-align:center;
  padding:40px 50px;
  border-radius:20px;

  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(14px);

  border:1px solid rgba(125,211,252,0.15);

  box-shadow:0 0 40px rgba(56,189,248,0.15);
}

/* TEXT */
h1{
  font-size:90px;
  font-weight:900;
  color:#7dd3fc;
  text-shadow:0 0 20px #38bdf8;
}

p{
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

/* BUTTON */
a{
  display:inline-block;
  margin-top:25px;
  padding:12px 18px;
  border-radius:12px;

  background:#7dd3fc;
  color:black;
  font-weight:800;
  text-decoration:none;

  box-shadow:0 0 25px rgba(56,189,248,0.3);
  transition:0.3s;
}

a:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(56,189,248,0.5);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">
  <h1>404</h1>
  <p>Aradığın sayfa bulunamadı.</p>
  <a href="/">Ana sayfaya dön</a>
</div>

</body>
</html>
